[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[build.processing.html]
  # Disable Netlify's "pretty URLs" so it does NOT 301 /foo -> /foo/.
  # Our prerendered URLs are canonical without a trailing slash.
  pretty_urls = false

[functions]
  node_bundler = "esbuild"

# ============================================================
# 1) Functions (clean URLs)
# ============================================================
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/newsletter"
  to = "/.netlify/functions/newsletter"
  status = 200

# ============================================================
# 2) Root -> default language (301)
# ============================================================
[[redirects]]
  from = "/"
  to = "/en"
  status = 301
  force = true

# ============================================================
# 3) Trailing-slash normalization (301 to non-slash canonical)
# ============================================================
[[redirects]]
  from = "/:lang/"
  to = "/:lang"
  status = 301
  force = true

[[redirects]]
  from = "/:lang/contact/"
  to = "/:lang/contact"
  status = 301
  force = true

[[redirects]]
  from = "/:lang/newsroom/"
  to = "/:lang/newsroom"
  status = 301
  force = true

[[redirects]]
  from = "/:lang/newsroom/:slug/"
  to = "/:lang/newsroom/:slug"
  status = 301
  force = true

[[redirects]]
  from = "/legal/:slug/"
  to = "/legal/:slug"
  status = 301
  force = true

# ============================================================
# 4) Prerendered routes -> static HTML (200, no redirect)
# Each rule maps a clean URL to its prerendered index.html so
# canonicals (no trailing slash) resolve directly with 200.
# ============================================================
[[redirects]]
  from = "/:lang/newsroom/:slug"
  to = "/:lang/newsroom/:slug/index.html"
  status = 200

[[redirects]]
  from = "/:lang/newsroom"
  to = "/:lang/newsroom/index.html"
  status = 200

[[redirects]]
  from = "/:lang/contact"
  to = "/:lang/contact/index.html"
  status = 200

[[redirects]]
  from = "/:lang"
  to = "/:lang/index.html"
  status = 200

[[redirects]]
  from = "/legal/:slug"
  to = "/legal/:slug/index.html"
  status = 200

# ============================================================
# 5) Final fallback: real 404 for everything else
# Unknown URLs (including unknown paths inside /:lang/*) get a real
# prerendered 404 page with HTTP 404 status -- no more soft 404s.
# ============================================================
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ============================================================
# Headers
# ============================================================

# Long-cache hashed assets emitted by Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers for HTML responses
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# No-cache only for the SPA shell so updates ship immediately
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/404.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
